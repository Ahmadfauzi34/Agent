[build]
rustflags = [
    "-C", "target-cpu=native",
    "-Dwarnings"
]

[target.'cfg(feature = "cargo-clippy")']
rustflags = [
    "-Wclippy::all",
    "-Wclippy::pedantic",
    "-Wclippy::nursery",
    "-Wclippy::cargo",
    "-Wclippy::perf",
    "-Wclippy::complexity",
    "-Wclippy::style",
    "-Dclippy::correctness",
    "-Dclippy::suspicious",
    "-Aclippy::module_name_repetitions",
    "-Aclippy::must_use_candidate"
]
